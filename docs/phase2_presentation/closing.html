<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #0A0A0A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-top: 20px solid #D4AF37;
            border-bottom: 20px solid #D4AF37;
        }
        .content-wrapper {
            text-align: center;
            max-width: 1100px;
            z-index: 2;
        }
        h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-transform: uppercase;
            line-height: 1.1;
        }
        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .accent-line {
            width: 120px;
            height: 6px;
            background-color: #CC0000;
            margin: 0 auto 50px auto;
        }
        .cta-box {
            border: 4px solid #006400;
            padding: 25px 50px;
            display: inline-block;
            margin-top: 20px;
        }
        .cta-text {
            font-size: 24px;
            font-weight: 700;
            color: #006400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .cta-subtext {
            font-size: 16px;
            color: #CCCCCC;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <h1>THE INFRASTRUCTURE FOR BLACK ECONOMIC EMPOWERMENT IS READY</h1>
            <div class="accent-line"></div>
            <h2>PHASE 2 IS 100% COMPLETE AND END-TO-END TESTED</h2>
            
            <div class="cta-box">
                <div class="cta-text">INITIATE PHASE 3: PRODUCTION WIRING</div>
                <div class="cta-subtext">FIREBASE AUTH • FIRESTORE • STRIPE PAYMENTS</div>
            </div>
        </div>
    </div>
</body>
</html>
