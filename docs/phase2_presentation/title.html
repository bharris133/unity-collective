<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #0A0A0A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-top: 20px solid #D4AF37;
            border-bottom: 20px solid #D4AF37;
        }
        .content-wrapper {
            text-align: center;
            max-width: 1000px;
            z-index: 2;
        }
        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        h2 {
            font-size: 28px;
            font-weight: 400;
            color: #D4AF37;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p.tagline {
            font-size: 18px;
            font-weight: 400;
            color: #FFFFFF;
            opacity: 0.8;
            letter-spacing: 1px;
        }
        .accent-line {
            width: 100px;
            height: 4px;
            background-color: #CC0000;
            margin: 0 auto 40px auto;
        }
        .accent-dot {
            width: 12px;
            height: 12px;
            background-color: #006400;
            border-radius: 50%;
            position: absolute;
            bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <h1>Unity Collective<br>Phase 2 Complete</h1>
            <div class="accent-line"></div>
            <h2>End-to-End Business Onboarding</h2>
            <p class="tagline">THE INFRASTRUCTURE FOR BLACK ECONOMIC EMPOWERMENT IS READY</p>
        </div>
        <div class="accent-dot"></div>
    </div>
</body>
</html>
